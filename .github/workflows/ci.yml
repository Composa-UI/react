name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Contract + entrypoint verification
        run: npm run check
      - name: Unit tests
        run: npm test
      - name: Build Storybook
        run: npm run build-storybook
