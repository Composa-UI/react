name: Deploy Storybook

# Builds the Storybook workbench and publishes it to GitHub Pages on every push to
# main, so there is always a live, browsable component reference.
#
# One-time setup (repo owner): Settings → Pages → Build and deployment →
# Source: "GitHub Actions". The site then publishes to
# https://<org>.github.io/<repo>/ (e.g. https://composa-ui.github.io/composa/).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Regenerate token + style artifacts the stories import, then build Storybook.
      - run: npm run build:tokens && npm run build:css
      - run: npm run build-storybook
      - uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
