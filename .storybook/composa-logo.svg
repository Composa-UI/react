<svg width="150" height="30" viewBox="0 0 150 30" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Composa UI">
  <!-- Brand mark: black rounded square with an orange (#ff5c16) rounded square offset behind it to the bottom-right (mirrors ComposaAppIcon). Mark is 28x28 mapped from the 37x37 source. -->
  <g transform="translate(0 1) scale(0.757)">
    <rect x="7" y="7" width="30" height="30" rx="7" fill="#ff5c16"/>
    <rect width="30" height="30" rx="7" fill="#111111"/>
  </g>
  <!-- Wordmark: tight single "Composa UI" with normal word spacing -->
  <text x="38" y="15" fill="#111111" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" font-weight="650" letter-spacing="-0.3" dominant-baseline="central">Composa<tspan fill="#ff5c16"> UI</tspan></text>
</svg>
